spring.datasource.hikari.maximum-pool-size=${DATABASE_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DATABASE_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DATABASE_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DATABASE_VALIDATION_TIMEOUT_MS:5000}

server.forward-headers-strategy=framework
management.endpoint.health.show-details=never
logging.level.com.infinitematters.bookkeeping=INFO
bookkeeping.auth.token.secret=${BOOKKEEPING_AUTH_TOKEN_SECRET}
bookkeeping.notifications.dispatch.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_SCHEDULER_ENABLED:true}
bookkeeping.notifications.dispatch.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dispatch.max-attempts=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_MAX_ATTEMPTS:5}
bookkeeping.notifications.dispatch.retry-delay=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_RETRY_DELAY:PT15M}
bookkeeping.notifications.dead-letter-tasks.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_SCHEDULER_ENABLED:true}
bookkeeping.notifications.dead-letter-tasks.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dead-letter-tasks.acknowledged-age-days=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_ACKNOWLEDGED_AGE_DAYS:2}
bookkeeping.notifications.dead-letter-tasks.stale-age-days=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_STALE_AGE_DAYS:2}
bookkeeping.notifications.dead-letter-escalations.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_ESCALATIONS_SCHEDULER_ENABLED:true}
bookkeeping.notifications.dead-letter-escalations.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_ESCALATIONS_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dead-letter-support-performance.ignored-rate-threshold=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_IGNORED_RATE_THRESHOLD:0.25}
bookkeeping.notifications.dead-letter-support-performance.assignment-lag-threshold-hours=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_ASSIGNMENT_LAG_THRESHOLD_HOURS:24}
bookkeeping.notifications.dead-letter-support-performance.resolution-lag-threshold-hours=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_RESOLUTION_LAG_THRESHOLD_HOURS:48}
bookkeeping.notifications.dead-letter-support-performance.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_SCHEDULER_ENABLED:true}
bookkeeping.notifications.dead-letter-support-performance.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.provider.webhook-secret=${BOOKKEEPING_NOTIFICATIONS_PROVIDER_WEBHOOK_SECRET}
bookkeeping.notifications.email.provider=${BOOKKEEPING_NOTIFICATIONS_EMAIL_PROVIDER:sendgrid}
bookkeeping.notifications.email.sendgrid.base-url=${BOOKKEEPING_NOTIFICATIONS_EMAIL_SENDGRID_BASE_URL:https://api.sendgrid.com}
bookkeeping.notifications.email.sendgrid.api-key=${BOOKKEEPING_NOTIFICATIONS_EMAIL_SENDGRID_API_KEY}
bookkeeping.notifications.email.sendgrid.from-email=${BOOKKEEPING_NOTIFICATIONS_EMAIL_SENDGRID_FROM_EMAIL}
bookkeeping.notifications.webhooks.sendgrid.public-key=${BOOKKEEPING_NOTIFICATIONS_WEBHOOKS_SENDGRID_PUBLIC_KEY}
bookkeeping.auth.refresh-token.ttl=${BOOKKEEPING_AUTH_REFRESH_TOKEN_TTL:P14D}
bookkeeping.auth.password-reset.ttl=${BOOKKEEPING_AUTH_PASSWORD_RESET_TTL:PT30M}
bookkeeping.auth.password-reset.base-url=${BOOKKEEPING_AUTH_PASSWORD_RESET_BASE_URL}
bookkeeping.auth.password-reset.expose-token-response=${BOOKKEEPING_AUTH_PASSWORD_RESET_EXPOSE_TOKEN_RESPONSE:false}
bookkeeping.auth.rate-limit.max-attempts=${BOOKKEEPING_AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
bookkeeping.auth.rate-limit.window=${BOOKKEEPING_AUTH_RATE_LIMIT_WINDOW:PT15M}
