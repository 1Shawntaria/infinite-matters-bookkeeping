spring.application.name=infinite-matters
spring.profiles.default=local

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:bookkeeping;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

bookkeeping.reminders.scheduler.enabled=${BOOKKEEPING_REMINDERS_SCHEDULER_ENABLED:false}
bookkeeping.reminders.scheduler.fixed-delay-ms=${BOOKKEEPING_REMINDERS_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dispatch.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_SCHEDULER_ENABLED:false}
bookkeeping.notifications.dispatch.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dispatch.max-attempts=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_MAX_ATTEMPTS:3}
bookkeeping.notifications.dispatch.retry-delay=${BOOKKEEPING_NOTIFICATIONS_DISPATCH_RETRY_DELAY:PT10M}
bookkeeping.notifications.dead-letter-tasks.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_SCHEDULER_ENABLED:false}
bookkeeping.notifications.dead-letter-tasks.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dead-letter-tasks.acknowledged-age-days=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_ACKNOWLEDGED_AGE_DAYS:2}
bookkeeping.notifications.dead-letter-tasks.stale-age-days=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_TASKS_STALE_AGE_DAYS:2}
bookkeeping.notifications.dead-letter-escalations.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_ESCALATIONS_SCHEDULER_ENABLED:false}
bookkeeping.notifications.dead-letter-escalations.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_ESCALATIONS_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.dead-letter-support-performance.ignored-rate-threshold=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_IGNORED_RATE_THRESHOLD:0.25}
bookkeeping.notifications.dead-letter-support-performance.assignment-lag-threshold-hours=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_ASSIGNMENT_LAG_THRESHOLD_HOURS:24}
bookkeeping.notifications.dead-letter-support-performance.resolution-lag-threshold-hours=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_RESOLUTION_LAG_THRESHOLD_HOURS:48}
bookkeeping.notifications.dead-letter-support-performance.escalation-age-hours=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_ESCALATION_AGE_HOURS:24}
bookkeeping.notifications.dead-letter-support-performance.scheduler.enabled=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_SCHEDULER_ENABLED:false}
bookkeeping.notifications.dead-letter-support-performance.scheduler.fixed-delay-ms=${BOOKKEEPING_NOTIFICATIONS_DEAD_LETTER_SUPPORT_PERFORMANCE_SCHEDULER_FIXED_DELAY_MS:300000}
bookkeeping.notifications.provider.webhook-secret=${BOOKKEEPING_NOTIFICATIONS_PROVIDER_WEBHOOK_SECRET:local-webhook-secret}
bookkeeping.notifications.email.provider=${BOOKKEEPING_NOTIFICATIONS_EMAIL_PROVIDER:logging}
bookkeeping.notifications.email.sendgrid.base-url=${BOOKKEEPING_NOTIFICATIONS_EMAIL_SENDGRID_BASE_URL:https://api.sendgrid.com}
bookkeeping.notifications.email.sendgrid.api-key=${BOOKKEEPING_NOTIFICATIONS_EMAIL_SENDGRID_API_KEY:}
bookkeeping.notifications.email.sendgrid.from-email=${BOOKKEEPING_NOTIFICATIONS_EMAIL_SENDGRID_FROM_EMAIL:no-reply@example.test}
bookkeeping.notifications.webhooks.sendgrid.public-key=${BOOKKEEPING_NOTIFICATIONS_WEBHOOKS_SENDGRID_PUBLIC_KEY:}
bookkeeping.auth.token.secret=${BOOKKEEPING_AUTH_TOKEN_SECRET:local-development-token-secret-change-me}
bookkeeping.auth.token.ttl=${BOOKKEEPING_AUTH_TOKEN_TTL:PT8H}
bookkeeping.auth.refresh-token.ttl=${BOOKKEEPING_AUTH_REFRESH_TOKEN_TTL:P14D}
bookkeeping.auth.response-tokens.enabled=${BOOKKEEPING_AUTH_RESPONSE_TOKENS_ENABLED:true}
bookkeeping.auth.cookies.access-token-name=${BOOKKEEPING_AUTH_ACCESS_COOKIE_NAME:im_access_token}
bookkeeping.auth.cookies.refresh-token-name=${BOOKKEEPING_AUTH_REFRESH_COOKIE_NAME:im_refresh_token}
bookkeeping.auth.cookies.secure=${BOOKKEEPING_AUTH_COOKIES_SECURE:false}
bookkeeping.auth.cookies.same-site=${BOOKKEEPING_AUTH_COOKIES_SAME_SITE:Lax}
bookkeeping.auth.password-reset.ttl=${BOOKKEEPING_AUTH_PASSWORD_RESET_TTL:PT30M}
bookkeeping.auth.password-reset.base-url=${BOOKKEEPING_AUTH_PASSWORD_RESET_BASE_URL:}
bookkeeping.auth.password-reset.expose-token-response=${BOOKKEEPING_AUTH_PASSWORD_RESET_EXPOSE_TOKEN_RESPONSE:false}
bookkeeping.auth.rate-limit.max-attempts=${BOOKKEEPING_AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
bookkeeping.auth.rate-limit.window=${BOOKKEEPING_AUTH_RATE_LIMIT_WINDOW:PT15M}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true
management.endpoint.health.show-details=when_authorized
management.endpoint.health.group.readiness.include=readinessState,db,bookkeeping
management.endpoint.health.group.liveness.include=livenessState,ping

info.app.name=${spring.application.name}
info.app.description=AI-assisted bookkeeping workflow service
info.app.version=@project.version@

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} requestId=%X{requestId:-} - %msg%n

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
